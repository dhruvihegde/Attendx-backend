# fly.toml — Fly.io configuration for AttendX backend
# Generated for attendx-backend Spring Boot app

app = "attendx-backend"
primary_region = "bom"  # Mumbai — closest to India

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # keeps app always on — no cold starts
  auto_start_machines = true
  min_machines_running = 1     # always keep at least 1 machine running

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
